<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Raponet</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #050505;
  overflow: hidden;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

canvas {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
}

#front {
  opacity: 1;
  transition: opacity 3.8s ease-in-out;
}

.content {
  position: fixed;
  left: 7vw;
  bottom: 9vh;
  max-width: 560px;
  color: rgba(232,226,216,0.72);
  font-size: 15px;
  line-height: 1.65;
  letter-spacing: 0.02em;
  user-select: none;
  text-shadow: 0 0 18px rgba(0,0,0,0.9);
  z-index: 10;
}

h1 {
  margin: 0 0 2.2rem 0;
  font-size: 1.35rem;
  font-weight: 400;
  letter-spacing: 0.08em;
}

p {
  margin: 0 0 1.2rem 0;
  color: rgba(232,226,216,0.58);
}

.quiet {
  margin-top: 2.6rem;
  padding-top: 1.2rem;
  border-top: 1px solid rgba(232,226,216,0.16);
  font-size: 0.9rem;
  color: rgba(232,226,216,0.48);
}

a {
  color: rgba(232,226,216,0.72);
  text-decoration: none;
  border-bottom: 1px solid rgba(232,226,216,0.18);
}

a:hover {
  border-bottom-color: rgba(232,226,216,0.65);
}

.trace {
  margin-top: 2.8rem;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: rgba(232,226,216,0.32);
}

.ethics {
  margin-top: 0.45rem;
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  color: rgba(232,226,216,0.22);
}

@media (max-width: 700px) {
  .content {
    left: 7vw;
    right: 7vw;
    bottom: 7vh;
    font-size: 14px;
  }
}
</style>
</head>

<body>

<canvas id="back"></canvas>
<canvas id="front"></canvas>

<div class="content">
  <h1>Raponet</h1>

  <p>
    Raponet is a small independent practice.
  </p>

  <p>
    It exists somewhere between photography, writing,
    web publishing, education and quiet technical experiments.
  </p>

  <p>
    The work is occasional, project-based and intentionally modest.
  </p>

  <div class="quiet">
    <p>
      Y-tunnus 1520001-3<br>
      Finland
    </p>

    <p>
     <a href="mailto:ari.rapo&#64;photodiary.guru">
  ari.rapo&#64;photodiary.guru
      </a>
    </p>
  </div>

  <div class="trace" id="label"></div>
  <div class="ethics" id="poem"></div>
</div>

<script>
const back = document.getElementById("back");
const front = document.getElementById("front");
const label = document.getElementById("label");
const poem = document.getElementById("poem");

let frontVisible = true;
let currentCanvas = front;
let nextCanvas = back;

let seed = 1;
let originalSeed = 1;

const modes = [
  "mist",
  "watercolor",
  "constellation",
  "soft-glitch",
  "organic-cells",
  "passing-lines",
  "dark-oracle"
];

function random() {
  seed = (seed * 1664525 + 1013904223) % 4294967296;
  return seed / 4294967296;
}

function hash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  }
  return Math.abs(h);
}

function getContextData() {
  return {
    time: new Date(),
    width: window.innerWidth,
    height: window.innerHeight,
    pixelRatio: window.devicePixelRatio || 1,
    language: navigator.language || "unknown",
    userAgent: navigator.userAgent || "unknown",
    platform: navigator.platform || "unknown",
    cores: navigator.hardwareConcurrency || 2,
    memory: navigator.deviceMemory || 4,
    touch: navigator.maxTouchPoints || 0,
    referrer: document.referrer || "",
    online: navigator.onLine
  };
}

function prepareCanvas(canvas) {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;

  const ctx = canvas.getContext("2d");
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);

  return ctx;
}

function generateTrace(canvas) {
  originalSeed = Math.floor(Math.random() * 999999999);
  seed = originalSeed;

  const ctx = prepareCanvas(canvas);
  const c = getContextData();

  const hour = c.time.getHours();
  const night = hour < 6 || hour > 21;
  const morning = hour >= 6 && hour < 11;
  const smallScreen = c.width < 700;
  const wideScreen = c.width / c.height > 1.6;
  const touchDevice = c.touch > 0;
  const arrivedFromElsewhere = c.referrer.length > 0;

  let modeBias = [];

  if (night) modeBias.push("dark-oracle", "constellation", "mist");
  if (morning) modeBias.push("watercolor", "mist");
  if (touchDevice) modeBias.push("organic-cells", "watercolor");
  if (wideScreen) modeBias.push("passing-lines", "mist");
  if (arrivedFromElsewhere) modeBias.push("soft-glitch", "passing-lines");

  const allModes = modes.concat(modeBias);
  const mode = allModes[Math.floor(random() * allModes.length)];

  const baseHue =
    (hash(c.language) +
    hash(c.platform) +
    Math.floor(hour * 13) +
    originalSeed) % 360;

  const density = Math.min(1.8, Math.max(0.45, c.cores / 6));
  const softness = touchDevice ? 0.85 : 0.45;
  const grainAmount = night ? 18 : 10;

  label.textContent = `POSSIBLE TRACE / ${mode} / ${originalSeed}`;
  poem.textContent = makePoeticGuess({
    night,
    morning,
    touchDevice,
    smallScreen,
    wideScreen,
    arrivedFromElsewhere
  });

  const w = window.innerWidth;
  const h = window.innerHeight;

  ctx.clearRect(0, 0, w, h);

  drawBackground(ctx, w, h, baseHue, night);

  if (mode === "mist") drawMist(ctx, w, h, baseHue, density);
  if (mode === "watercolor") drawWatercolor(ctx, w, h, baseHue, density);
  if (mode === "constellation") drawConstellation(ctx, w, h, density);
  if (mode === "soft-glitch") drawSoftGlitch(ctx, w, h, baseHue, density);
  if (mode === "organic-cells") drawOrganicCells(ctx, w, h, baseHue, density, softness);
  if (mode === "passing-lines") drawPassingLines(ctx, w, h, density);
  if (mode === "dark-oracle") drawDarkOracle(ctx, w, h, baseHue);

  addGrain(ctx, canvas, grainAmount);
}

function makePoeticGuess(o) {
  const lines = [];

  if (o.night) lines.push("A quiet system remains available after light.");
  else if (o.morning) lines.push("The page opens like a pale working note.");
  else lines.push("The page listens to the weather of the screen.");

  if (o.touchDevice) lines.push("This trace arrives by hand.");
  else lines.push("The cursor keeps a little distance.");

  if (o.smallScreen) lines.push("The practice becomes pocket-sized.");
  else if (o.wideScreen) lines.push("There is room for a modest structure to wander.");
  else lines.push("The trace stays almost square with itself.");

  if (o.arrivedFromElsewhere) lines.push("Something led you here.");
  else lines.push("You appeared without a visible past.");

  return lines[Math.floor(random() * lines.length)];
}

function drawBackground(ctx, w, h, baseHue, night) {
  const gradient = ctx.createRadialGradient(
    w * random(), h * random(), 10,
    w * 0.5, h * 0.5, Math.max(w, h)
  );

  const lightness = night ? 10 : 15;

  gradient.addColorStop(0, `hsla(${baseHue}, 62%, ${lightness + 18}%, 0.42)`);
  gradient.addColorStop(0.45, `hsla(${(baseHue + 90) % 360}, 50%, ${lightness}%, 0.36)`);
  gradient.addColorStop(1, "#050505");

  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, w, h);
}

function drawMist(ctx, w, h, baseHue, density) {
  ctx.globalCompositeOperation = "screen";

  for (let i = 0; i < 120 * density; i++) {
    const x = random() * w;
    const y = random() * h;
    const r = 30 + random() * Math.min(w, h) * 0.24;

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);

    ctx.fillStyle =
      `hsla(${(baseHue + random() * 130) % 360}, 60%, 45%, ${0.012 + random() * 0.045})`;

    ctx.fill();
  }

  ctx.globalCompositeOperation = "source-over";
}

function drawWatercolor(ctx, w, h, baseHue, density) {
  ctx.globalCompositeOperation = "screen";

  for (let i = 0; i < 55 * density; i++) {
    const x = random() * w;
    const y = random() * h;
    const r = 80 + random() * Math.min(w, h) * 0.3;

    ctx.beginPath();

    for (let a = 0; a < Math.PI * 2; a += 0.25) {
      const rr = r * (0.72 + random() * 0.45);
      const px = x + Math.cos(a) * rr;
      const py = y + Math.sin(a) * rr;

      if (a === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }

    ctx.closePath();

    ctx.fillStyle =
      `hsla(${(baseHue + random() * 90) % 360}, 55%, 55%, ${0.018 + random() * 0.035})`;

    ctx.fill();
  }

  ctx.globalCompositeOperation = "source-over";
}

function drawConstellation(ctx, w, h, density) {
  const points = [];

  for (let i = 0; i < 80 * density; i++) {
    points.push({
      x: random() * w,
      y: random() * h,
      r: 0.8 + random() * 2.2
    });
  }

  ctx.strokeStyle = "rgba(255,255,255,0.08)";
  ctx.lineWidth = 1;

  for (let i = 0; i < points.length; i++) {
    for (let j = i + 1; j < points.length; j++) {
      const dx = points[i].x - points[j].x;
      const dy = points[i].y - points[j].y;
      const d = Math.sqrt(dx * dx + dy * dy);

      if (d < 120 + random() * 80) {
        ctx.beginPath();
        ctx.moveTo(points[i].x, points[i].y);
        ctx.lineTo(points[j].x, points[j].y);
        ctx.stroke();
      }
    }
  }

  ctx.fillStyle = "rgba(255,255,255,0.42)";

  points.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawSoftGlitch(ctx, w, h, baseHue, density) {
  for (let i = 0; i < 70 * density; i++) {
    const x = random() * w;
    const y = random() * h;
    const ww = 20 + random() * w * 0.35;
    const hh = 1 + random() * 18;

    ctx.fillStyle =
      `hsla(${(baseHue + random() * 220) % 360}, 70%, 55%, ${0.025 + random() * 0.09})`;

    ctx.fillRect(x, y, ww, hh);
  }
}

function drawOrganicCells(ctx, w, h, baseHue, density, softness) {
  ctx.globalCompositeOperation = "screen";

  for (let i = 0; i < 95 * density; i++) {
    const x = random() * w;
    const y = random() * h;
    const r = 12 + random() * Math.min(w, h) * 0.08;

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);

    ctx.strokeStyle =
      `hsla(${(baseHue + random() * 120) % 360}, 65%, 60%, ${0.05 + softness * 0.06})`;

    ctx.lineWidth = 0.5 + random() * 2.5;
    ctx.stroke();

    ctx.fillStyle =
      `hsla(${(baseHue + random() * 120) % 360}, 55%, 45%, 0.018)`;

    ctx.fill();
  }

  ctx.globalCompositeOperation = "source-over";
}

function drawPassingLines(ctx, w, h, density) {
  for (let i = 0; i < 26 * density; i++) {
    ctx.beginPath();

    let x = random() * w;
    let y = random() * h;

    ctx.moveTo(x, y);

    const points = 5 + Math.floor(random() * 10);

    for (let j = 0; j < points; j++) {
      x += (random() - 0.5) * w * 0.42;
      y += (random() - 0.5) * h * 0.42;
      ctx.lineTo(x, y);
    }

    ctx.strokeStyle =
      `rgba(255,255,255,${0.025 + random() * 0.10})`;

    ctx.lineWidth = 0.5 + random() * 3;
    ctx.stroke();
  }
}

function drawDarkOracle(ctx, w, h, baseHue) {
  ctx.globalCompositeOperation = "screen";

  const cx = w * (0.35 + random() * 0.3);
  const cy = h * (0.35 + random() * 0.3);

  for (let i = 0; i < 9; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, 40 + i * 38 + random() * 20, 0, Math.PI * 2);

    ctx.strokeStyle =
      `hsla(${(baseHue + i * 18) % 360}, 70%, 55%, ${0.035 + random() * 0.055})`;

    ctx.lineWidth = 1 + random() * 2;
    ctx.stroke();
  }

  ctx.globalCompositeOperation = "source-over";

  for (let i = 0; i < 22; i++) {
    ctx.fillStyle =
      `rgba(255,255,255,${0.025 + random() * 0.09})`;

    ctx.fillRect(
      random() * w,
      random() * h,
      1 + random() * 80,
      1
    );
  }
}

function addGrain(ctx, canvas, grainAmount) {
  const imageData =
    ctx.getImageData(0, 0, canvas.width, canvas.height);

  const data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    const noise = (Math.random() - 0.5) * grainAmount;

    data[i] += noise;
    data[i + 1] += noise;
    data[i + 2] += noise;
  }

  ctx.putImageData(imageData, 0, 0);
}

function nextDelay() {
  return 4000 + Math.random() * 9000;
}

function transitionToNewTrace() {
  generateTrace(nextCanvas);

  if (frontVisible) {
    front.style.opacity = 0;
  } else {
    front.style.opacity = 1;
  }

  frontVisible = !frontVisible;

  const temp = currentCanvas;
  currentCanvas = nextCanvas;
  nextCanvas = temp;

  setTimeout(transitionToNewTrace, nextDelay());
}

function resizeBoth() {
  generateTrace(currentCanvas);
  generateTrace(nextCanvas);
}

window.addEventListener("resize", resizeBoth);

generateTrace(front);
generateTrace(back);

setTimeout(transitionToNewTrace, nextDelay());
</script>

</body>
</html>
