<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raponet</title>

  <style>
    :root {
      --bg: #0f0f0f;
      --text: #e8e2d8;
      --muted: #8f8a82;
      --line: #2a2a2a;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    main {
      width: min(88vw, 520px);
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      margin: 0 0 2.5rem 0;
    }

    p {
      margin: 0 0 1.4rem 0;
      color: var(--muted);
    }

    .quiet {
      margin-top: 3rem;
      padding-top: 1.4rem;
      border-top: 1px solid var(--line);
      font-size: 0.92rem;
      color: var(--muted);
    }

    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
      transition: border-color 0.3s ease;
    }

    a:hover {
      border-bottom-color: var(--text);
    }

    .trace {
      margin-top: 3.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      opacity: 0.45;
      min-height: 1.4em;
      letter-spacing: 0.03em;
      transition: opacity 1.5s ease;
    }

    .floating {
      position: absolute;
      color: rgba(255,255,255,0.035);
      font-size: 0.8rem;
      pointer-events: none;
      user-select: none;
      animation: drift linear infinite;
      white-space: nowrap;
      z-index: 1;
    }

    @keyframes drift {
      from {
        transform: translateX(110vw);
      }
      to {
        transform: translateX(-120vw);
      }
    }
  </style>
</head>

<body>

  <main>
    <h1>Raponet</h1>

    <p>
      Raponet is a small independent practice.
    </p>

    <p>
      It exists somewhere between photography, writing,
      web publishing, education and quiet technical experiments.
    </p>

    <p>
      The work is occasional, project-based and intentionally modest.
    </p>

    <div class="quiet">
      <p>
        Y-tunnus 1520001-3<br>
        Finland
      </p>

      <p>
        <a href="mailto:ari.rapo@photodiary.guru">
          ari.rapo@photodiary.guru
        </a>
      </p>
    </div>

    <div class="trace" id="trace"></div>
  </main>

  <script>
    const traces = [
      "photography",
      "memory",
      "quiet web publishing",
      "education",
      "small experiments",
      "writing",
      "technical traces",
      "between images and systems",
      "possible traces",
      "occasional projects",
      "something remains",
      "slow observation",
      "networked fragments",
      "lightweight structures",
      "minimal systems"
    ];

    const floatingTexts = [
      "000111",
      "trace",
      "memory",
      "signal",
      "drift",
      "archive",
      "observation",
      "fragment",
      "latent",
      "network",
      "echo",
      "quiet system",
      "possible trace",
      "photodiary"
    ];

    const traceEl = document.getElementById("trace");

    function updateTrace() {
      traceEl.style.opacity = 0;

      setTimeout(() => {
        const text =
          traces[Math.floor(Math.random() * traces.length)];

        traceEl.textContent = text;
        traceEl.style.opacity = 0.45;
      }, 800);
    }

    updateTrace();
    setInterval(updateTrace, 6000);

    function createFloatingText() {
      const el = document.createElement("div");
      el.className = "floating";

      el.textContent =
        floatingTexts[
          Math.floor(Math.random() * floatingTexts.length)
        ];

      el.style.top = Math.random() * 100 + "vh";
      el.style.fontSize =
        (0.65 + Math.random() * 0.5) + "rem";

      el.style.animationDuration =
        (30 + Math.random() * 40) + "s";

      el.style.opacity =
        (0.02 + Math.random() * 0.05);

      document.body.appendChild(el);

      setTimeout(() => {
        el.remove();
      }, 80000);
    }

    for (let i = 0; i < 7; i++) {
      setTimeout(createFloatingText, i * 3000);
    }

    setInterval(createFloatingText, 7000);
  </script>

</body>
</html>
